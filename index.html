<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кубик Рубіка 3D</title>
    
    <!-- Іконки для веб-додатка (PWA) -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#529b89">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-gradient: linear-gradient(180deg, #529b89 0%, #3d796a 100%);
            --bg-panel: rgba(20, 20, 30, 0.9);
            --bg-topbar: rgba(20, 20, 30, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f0f0f5;
            --btn-bg: #272736;
            --btn-hover: #3a3a52;
        }

        body { 
            overflow: hidden; 
            background: var(--bg-gradient); 
            font-family: system-ui, -apple-system, sans-serif; 
            color: var(--text-color); 
            height: 100vh;
            width: 100vw;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        #canvas-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; 
            opacity: 0; 
            transition: opacity 0.15s ease-out;
        }
        #canvas-container.loaded { opacity: 1; }
        
        #top-bar { 
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 10; 
            background: var(--bg-topbar); padding: 4px 12px; border-radius: 30px; 
            border: 1px solid var(--border-color); backdrop-filter: blur(15px); 
            display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .stat-badge { font-size: 12px; font-weight: 600; white-space: nowrap; }
        .stat-badge span { color: #00d2ff; font-size: 13px; }

        .sound-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px 4px;
            border-radius: 50%;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .sound-btn:hover { transform: scale(1.15); }
        .sound-btn.muted { opacity: 0.5; }

        .theme-dots { display: flex; gap: 5px; align-items: center; }
        .theme-dot {
            width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: all 0.2s ease;
        }
        .theme-dot.active { border-color: #fff; transform: scale(1.1); }

        #controls-panel { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 10; 
            width: 100%; max-width: 100%; background: var(--bg-panel); 
            border-top: 1px solid var(--border-color); padding: 12px 10px 15px 10px; backdrop-filter: blur(20px); 
            box-shadow: 0 -5px 30px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 8px; 
            border-radius: 20px 20px 0 0;
        }

        .algo-header-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .help-btn {
            background: #f39c12;
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .help-btn:hover { background: #f1c40f; transform: scale(1.05); }
        .help-btn.active { background: #00d2ff; color: #141420; box-shadow: 0 0 10px #00d2ff; }

        #algo-display {
            flex-grow: 1;
            background: #15151e; padding: 6px; border-radius: 8px; text-align: center;
            font-family: monospace; font-size: 15px; color: #ffcc00; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05); min-height: 32px; 
            display: flex; align-items: center; justify-content: center; gap: 6px;
            flex-wrap: wrap; line-height: 1.2;
        }
        
        .algo-step { padding: 2px 4px; border-radius: 3px; transition: all 0.15s ease; color: #ffcc00; }
        .algo-step.current { background: #c0392b; color: #ffffff; transform: scale(1.15); box-shadow: 0 0 5px #c0392b; }
        .algo-step.done { color: #555566; }
        
        .button-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        
        button.move-btn { 
            background: var(--btn-bg); border: none; color: #fff; 
            padding: 8px 0; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; 
            transition: all 0.1s ease; text-align: center;
        }
        button.move-btn:hover { background: var(--btn-hover); }
        button.move-btn span { color: #ff7700; }

        .mode-wrapper {
            display: flex; background: #1e1e2a; border-radius: 8px; padding: 2px; border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-toggle {
            flex: 1; text-align: center; padding: 6px 0; font-size: 13px; font-weight: 700; 
            cursor: pointer; border-radius: 6px; transition: all 0.1s ease; color: #a0a0ab;
        }
        .mode-toggle.active { background: #27ae60; color: #fff; }

        .alg-select-wrapper { position: relative; width: 100%; }
        .alg-select {
            width: 100%; background: #27ae60; color: white; border: none; 
            padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; 
            cursor: pointer; appearance: none; -webkit-appearance: none; outline: none; text-align: center;
        }
        .alg-select:hover { background: #2ecc71; }
        .alg-select-wrapper::after {
            content: '▼'; font-size: 7px; color: white; position: absolute; right: 12px; top: 13px; pointer-events: none;
        }

        .fx-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .action-btn { background: #2980b9; color: #fff; border: none; padding: 8px 0; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .action-btn:hover { background: #3498db; }
        .danger-btn { background: #c0392b; color: #fff; border: none; padding: 8px 0; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .danger-btn:hover { background: #e74c3c; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="top-bar">
        <div class="stat-badge">Moves: <span id="counter">0</span></div>
        <button id="sound-btn" class="sound-btn" onclick="toggleSound()" title="Увімкнути/Вимкнути звук">🔊</button>
        <div class="theme-dots">
            <div class="theme-dot" style="background: #09090e;" onclick="switchTheme('dark', this)"></div>
            <div class="theme-dot active" style="background: #529b89;" onclick="switchTheme('mint', this)"></div>
            <div class="theme-dot" style="background: #142824;" onclick="switchTheme('teal', this)"></div>
        </div>
    </div>

    <div id="controls-panel">
        <div class="algo-header-wrapper">
            <button id="help-btn" class="help-btn" onclick="toggleFaceLabels()" title="Показати підписи граней">?</button>
            <div id="algo-display">Choose combination...</div>
        </div>

        <div class="button-group">
            <button class="move-btn" onclick="handleMove('U')">U</button>
            <button class="move-btn" onclick="handleMove('U\'')">U<span>'</span></button>
            <button class="move-btn" onclick="handleMove('D')">D</button>
            <button class="move-btn" onclick="handleMove('D\'')">D<span>'</span></button>
            <button class="move-btn" onclick="handleMove('F')">F</button>
            <button class="move-btn" onclick="handleMove('F\'')">F<span>'</span></button>
        </div>
        <div class="button-group">
            <button class="move-btn" onclick="handleMove('B')">B</button>
            <button class="move-btn" onclick="handleMove('B\'')">B<span>'</span></button>
            <button class="move-btn" onclick="handleMove('R')">R</button>
            <button class="move-btn" onclick="handleMove('R\'')">R<span>'</span></button>
            <button class="move-btn" onclick="handleMove('L')">L</button>
            <button class="move-btn" onclick="handleMove('L\'')">L<span>'</span></button>
        </div>

        <div class="mode-wrapper">
            <div id="mode-manual" class="mode-toggle active" onclick="setMode('manual')">Manual</div>
            <div id="mode-auto" class="mode-toggle" onclick="setMode('auto')">Avto</div>
        </div>

        <div class="alg-select-wrapper">
            <select class="alg-select" id="alg-select" onchange="selectAlgorithm(this.value); this.selectedIndex=0;">
                <option value="" disabled selected>🎓 Choose algorithm...</option>
                <option value="R U R' U'">🔄 Right Pip-Pap</option>
                <option value="L' U' L U">🔄 Left Pip-Pap</option>
                <option value="R U R' U R U2 R'">⚡ OLL Fish Algorithm</option>
                <option value="R U R' U' R' F R2 U' R' U' R U R' F'">🧩 T-Permutation (PLL)</option>
                <option value="R' F R' B2 R F' R' B2 R2">📐 A-Permutation (Corners)</option>
                <option value="F R U R' U' F'">🚪 Cross Exit (OLL)</option>
            </select>
        </div>

        <div class="fx-group">
            <button class="action-btn" onclick="triggerScramble()">🔀 Scramble</button>
            <button class="danger-btn" onclick="triggerReset()">⟳ Reset</button>
        </div>
    </div>

    <script>
        const COLORS = { 
            U: '#fffb00', D: '#ffffff', R: '#00ff66', 
            L: '#0066ff', F: '#ff0055', B: '#ff7700'
        };
        
        const THEMES = {
            dark: { gradient: 'linear-gradient(135deg, #09090e 0%, #141420 100%)' },
            mint: { gradient: 'linear-gradient(180deg, #529b89 0%, #3d796a 100%)' },
            teal: { gradient: 'linear-gradient(135deg, #142824 0%, #0a1412 100%)' }
        };

        let scene, camera, renderer, controls, cubies = [];
        let moveQueue = [];
        let historyMoves = [];
        let isAnimating = false;
        let isRestoring = false;
        let moveCount = 0;
        let currentMode = 'manual';
        let isMuted = false;
        
        let storedAlgoStr = ""; 
        let activeAlgoSteps = [];
        let currentStepIndex = -1;
        
        let faceLabelsGroup = new THREE.Group();
        let showLabels = false;

        const pivot = new THREE.Group();
        const CUBIE_SIZE = 0.99; 
        const PLASTIC_COLOR = '#3a3a42'; 

        function toggleSound() {
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            if (isMuted) {
                btn.innerText = '🔇';
                btn.classList.add('muted');
            } else {
                btn.innerText = '🔊';
                btn.classList.remove('muted');
            }
        }

        let audioCtx = null;
        function playClickSound() {
            if (isRestoring || isMuted) return;
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const now = audioCtx.currentTime;

                const bufferSize = Math.floor(audioCtx.sampleRate * 0.08);
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.setValueAtTime(2100, now);
                noiseFilter.Q.setValueAtTime(1.8, now);

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.06, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);

                const snapTime = now + 0.04;

                const snapOsc = audioCtx.createOscillator();
                const snapGain = audioCtx.createGain();
                snapOsc.type = 'triangle';
                snapOsc.frequency.setValueAtTime(2400, snapTime);
                snapOsc.frequency.exponentialRampToValueAtTime(250, snapTime + 0.006);

                snapGain.gain.setValueAtTime(0.45, snapTime);
                snapGain.gain.exponentialRampToValueAtTime(0.001, snapTime + 0.006);

                snapOsc.connect(snapGain);
                snapGain.connect(audioCtx.destination);
                snapOsc.start(snapTime);
                snapOsc.stop(snapTime + 0.007);
            } catch (e) {}
        }

        function createFaceTexture(hexColor) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d'); 
            ctx.fillStyle = PLASTIC_COLOR; 
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = hexColor; 
            ctx.beginPath(); 
            ctx.roundRect(7, 7, 114, 114, 16); 
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        function createXeroxLogoTexture(hexColor) {
            const canvas = document.createElement('canvas'); 
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d'); 
            
            ctx.fillStyle = PLASTIC_COLOR; 
            ctx.fillRect(0, 0, 128, 128);
            
            ctx.fillStyle = hexColor; 
            ctx.beginPath(); 
            ctx.roundRect(7, 7, 114, 114, 16); 
            ctx.fill();
            
            ctx.fillStyle = '#c0392b';
            
            ctx.beginPath(); ctx.moveTo(32, 25); ctx.lineTo(46, 25); ctx.lineTo(64, 49); ctx.lineTo(50, 49); ctx.fill();
            ctx.beginPath(); ctx.moveTo(96, 25); ctx.lineTo(82, 25); ctx.lineTo(64, 49); ctx.lineTo(78, 49); ctx.fill();
            ctx.beginPath(); ctx.moveTo(32, 79); ctx.lineTo(46, 79); ctx.lineTo(64, 55); ctx.lineTo(50, 55); ctx.fill();
            ctx.beginPath(); ctx.moveTo(96, 79); ctx.lineTo(82, 79); ctx.lineTo(64, 55); ctx.lineTo(78, 55); ctx.fill();
            
            ctx.strokeStyle = '#141420';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(36, 52); ctx.lineTo(92, 52); ctx.stroke();
            
            ctx.fillStyle = '#141420';
            ctx.font = '900 9px "Courier New", monospace, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const text = "LOGIXCUBE";
            ctx.fillText(text.split('').join(' '), 64, 102); 
            
            return new THREE.CanvasTexture(canvas);
        }

        function createLabelSprite(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(20, 20, 30, 0.85)';
            ctx.beginPath();
            ctx.arc(64, 64, 50, 0, Math.PI * 2);
            ctx.fill();

            ctx.lineWidth = 6;
            ctx.strokeStyle = color;
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 55px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 66);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(0.8, 0.8, 0.8);
            return sprite;
        }

        function setupFaceLabels() {
            scene.remove(faceLabelsGroup);
            faceLabelsGroup = new THREE.Group();

            const labelData = [
                { text: 'U', pos: new THREE.Vector3(0, 2.1, 0), color: COLORS.U },
                { text: 'D', pos: new THREE.Vector3(0, -2.1, 0), color: COLORS.D },
                { text: 'R', pos: new THREE.Vector3(2.1, 0, 0), color: COLORS.R },
                { text: 'L', pos: new THREE.Vector3(-2.1, 0, 0), color: COLORS.L },
                { text: 'F', pos: new THREE.Vector3(0, 0, 2.1), color: COLORS.F },
                { text: 'B', pos: new THREE.Vector3(0, 0, -2.1), color: COLORS.B }
            ];

            labelData.forEach(item => {
                const sprite = createLabelSprite(item.text, item.color);
                sprite.position.copy(item.pos);
                faceLabelsGroup.add(sprite);
            });

            faceLabelsGroup.visible = showLabels;
            scene.add(faceLabelsGroup);
        }

        function toggleFaceLabels() {
            showLabels = !showLabels;
            faceLabelsGroup.visible = showLabels;
            const btn = document.getElementById('help-btn');
            if (showLabels) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function buildCube() {
            cubies.forEach(c => scene.remove(c)); 
            cubies = [];
            const geom = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
            const internalMat = new THREE.MeshLambertMaterial({ color: PLASTIC_COLOR });

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        if (x === 0 && y === 0 && z === 0) continue; 
                        
                        const isWhiteCenter = (x === 0 && y === -1 && z === 0);
                        
                        const mats = [
                            x === 1 ? new THREE.MeshLambertMaterial({ map: createFaceTexture(COLORS.R) }) : internalMat,  
                            x === -1 ? new THREE.MeshLambertMaterial({ map: createFaceTexture(COLORS.L) }) : internalMat, 
                            y === 1 ? new THREE.MeshLambertMaterial({ map: createFaceTexture(COLORS.U) }) : internalMat,  
                            y === -1 ? new THREE.MeshLambertMaterial({ 
                                map: isWhiteCenter ? createXeroxLogoTexture(COLORS.D) : createFaceTexture(COLORS.D) 
                            }) : internalMat, 
                            z === 1 ? new THREE.MeshLambertMaterial({ map: createFaceTexture(COLORS.F) }) : internalMat,  
                            z === -1 ? new THREE.MeshLambertMaterial({ map: createFaceTexture(COLORS.B) }) : internalMat  
                        ];
                        
                        const mesh = new THREE.Mesh(geom, mats); 
                        mesh.position.set(x, y, z);
                        scene.add(mesh); 
                        cubies.push(mesh);
                    }
                }
            }
            setupFaceLabels();
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); 
            
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(6.5, 5.0, 9.5); 
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Захист від втрати WebGL текстур на мобільних
            renderer.domElement.addEventListener('webglcontextlost', (event) => {
                event.preventDefault();
            }, false);

            renderer.domElement.addEventListener('webglcontextrestored', () => {
                buildCube();
            }, false);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08; // Чуйне та плавне обертання пальцем
            controls.autoRotate = false; // Вимикаємо авто-обертання при старті
            
            controls.target.set(0, -1.2, 0);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.35);
            dirLight.position.set(5, 15, 7);
            scene.add(dirLight);
            
            scene.add(pivot);
            buildCube();
            
            loadSavedStateSync();

            container.classList.add('loaded');

            window.addEventListener('resize', onWindowResize);
            animateLoop();
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            if (!isAnimating && moveQueue.length > 0 && !isRestoring) {
                if (activeAlgoSteps.length > 0 && currentMode === 'auto') {
                    currentStepIndex++;
                    updateAlgoHighlight();
                }
                const nextMove = moveQueue.shift();
                historyMoves.push(nextMove);
                saveState();
                executeMove(nextMove);
            }
            controls.update();
            renderer.render(scene, camera);
        }

        function getLayerCubies(face) {
            return cubies.filter(c => {
                if (face === 'R') return c.position.x > 0.5;
                if (face === 'L') return c.position.x < -0.5;
                if (face === 'U') return c.position.y > 0.5;
                if (face === 'D') return c.position.y < -0.5;
                if (face === 'F') return c.position.z > 0.5;
                if (face === 'B') return c.position.z < -0.5;
                return false;
            });
        }

        function executeInstantMove(moveStr) {
            const isPrime = moveStr.includes("'");
            const isDouble = moveStr.includes("2");
            const face = moveStr[0];
            const layer = getLayerCubies(face);

            pivot.position.set(0, 0, 0); 
            pivot.rotation.set(0, 0, 0);
            pivot.updateMatrixWorld();

            layer.forEach(c => pivot.attach(c));

            let angle = Math.PI / 2;
            if (face === 'R' || face === 'U' || face === 'F') angle = -angle;
            if (isPrime) angle = -angle;
            if (isDouble) angle = angle * 2;

            if (face === 'R' || face === 'L') pivot.rotation.x = angle;
            if (face === 'U' || face === 'D') pivot.rotation.y = angle;
            if (face === 'F' || face === 'B') pivot.rotation.z = angle;

            pivot.updateMatrixWorld();
            const tempArray = [...pivot.children];
            tempArray.forEach(c => {
                scene.attach(c);
                c.position.x = Math.round(c.position.x);
                c.position.y = Math.round(c.position.y);
                c.position.z = Math.round(c.position.z);
                
                c.rotation.x = Math.round(c.rotation.x / (Math.PI / 2)) * (Math.PI / 2);
                c.rotation.y = Math.round(c.rotation.y / (Math.PI / 2)) * (Math.PI / 2);
                c.rotation.z = Math.round(c.rotation.z / (Math.PI / 2)) * (Math.PI / 2);
            });
        }

        function executeMove(moveStr) {
            isAnimating = true;
            playClickSound();

            const isPrime = moveStr.includes("'");
            const isDouble = moveStr.includes("2");
            const face = moveStr[0];
            const layer = getLayerCubies(face);

            pivot.position.set(0, 0, 0); 
            pivot.rotation.set(0, 0, 0);
            pivot.updateMatrixWorld();

            layer.forEach(c => pivot.attach(c));

            let angle = Math.PI / 2;
            if (face === 'R' || face === 'U' || face === 'F') angle = -angle;
            if (isPrime) angle = -angle;
            if (isDouble) angle = angle * 2;

            let currentProgress = 0;
            
            // ОПТИМІЗАЦІЯ ШВИДКОСТІ:
            // 7 кадрів для ручних натискань, 4 кадри для масових алгоритмів (Scramble/Auto)
            const duration = moveQueue.length > 2 ? 4 : 7; 

            function animateRotation() {
                currentProgress++;
                const step = angle / duration;
                
                if (face === 'R' || face === 'L') pivot.rotation.x += step;
                if (face === 'U' || face === 'D') pivot.rotation.y += step;
                if (face === 'F' || face === 'B') pivot.rotation.z += step;

                if (currentProgress < duration) {
                    requestAnimationFrame(animateRotation);
                } else {
                    pivot.updateMatrixWorld();
                    const tempArray = [...pivot.children];
                    tempArray.forEach(c => {
                        scene.attach(c);
                        c.position.x = Math.round(c.position.x);
                        c.position.y = Math.round(c.position.y);
                        c.position.z = Math.round(c.position.z);
                        
                        c.rotation.x = Math.round(c.rotation.x / (Math.PI / 2)) * (Math.PI / 2);
                        c.rotation.y = Math.round(c.rotation.y / (Math.PI / 2)) * (Math.PI / 2);
                        c.rotation.z = Math.round(c.rotation.z / (Math.PI / 2)) * (Math.PI / 2);
                    });
                    
                    isAnimating = false;
                }
            }
            animateRotation();
        }

        function updateAlgoHighlight() {
            if (activeAlgoSteps.length === 0) return;
            const container = document.getElementById('algo-display');
            let html = '';
            activeAlgoSteps.forEach((step, idx) => {
                let cls = 'algo-step';
                if (idx === currentStepIndex) cls += ' current';
                if (idx < currentStepIndex) cls += ' done';
                html += `<span class="${cls}">${step}</span>`;
            });
            container.innerHTML = html;
        }

        function handleMove(move) {
            moveQueue.push(move);
            moveCount++;
            document.getElementById('counter').innerText = moveCount;
        }

        function selectAlgorithm(algoStr) {
            if (!algoStr) return;
            storedAlgoStr = algoStr;
            activeAlgoSteps = algoStr.split(' ');
            currentStepIndex = -1;
            const container = document.getElementById('algo-display');
            container.innerHTML = activeAlgoSteps.map(step => `<span class="algo-step">${step}</span>`).join('');
            moveQueue = []; 
            saveState();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-toggle').forEach(el => el.classList.remove('active'));
            document.getElementById(mode === 'auto' ? 'mode-auto' : 'mode-manual').classList.add('active');
            
            if (mode === 'auto') {
                if (storedAlgoStr) {
                    moveQueue = []; 
                    currentStepIndex = -1;
                    activeAlgoSteps = storedAlgoStr.split(' ');
                    updateAlgoHighlight();
                    activeAlgoSteps.forEach(step => {
                        moveQueue.push(step);
                        moveCount++;
                    });
                    document.getElementById('counter').innerText = moveCount;
                }
            } else {
                moveQueue = [];
                if (storedAlgoStr) {
                    currentStepIndex = -1;
                    const container = document.getElementById('algo-display');
                    container.innerHTML = activeAlgoSteps.map(step => `<span class="algo-step">${step}</span>`).join('');
                }
            }
            saveState();
        }

        function triggerScramble() {
            triggerReset();
            const moves = ['U', 'D', 'R', 'L', 'F', 'B', "U'", "D'", "R'", "L'", "F'", "B'"];
            for (let i = 0; i < 20; i++) {
                moveQueue.push(moves[Math.floor(Math.random() * moves.length)]);
            }
        }

        function triggerReset() {
            moveQueue = [];
            historyMoves = [];
            activeAlgoSteps = [];
            currentStepIndex = -1;
            isAnimating = false;
            moveCount = 0;
            storedAlgoStr = "";
            localStorage.removeItem('rubik_cube_save_data');
            document.getElementById('counter').innerText = '0';
            document.getElementById('algo-display').innerText = "Choose combination...";
            buildCube();
            if (controls) controls.target.set(0, -1.2, 0);
        }

        function saveState() {
            const data = {
                historyMoves: historyMoves,
                moveCount: moveCount,
                storedAlgoStr: storedAlgoStr,
                currentMode: currentMode
            };
            localStorage.setItem('rubik_cube_save_data', JSON.stringify(data));
        }

        function loadSavedStateSync() {
            const savedRaw = localStorage.getItem('rubik_cube_save_data');
            if (!savedRaw) return;

            try {
                const data = JSON.parse(savedRaw);
                if (data.historyMoves && data.historyMoves.length > 0) {
                    isRestoring = true;
                    historyMoves = [...data.historyMoves];
                    moveCount = data.moveCount || 0;
                    document.getElementById('counter').innerText = moveCount;

                    if (data.storedAlgoStr) {
                        storedAlgoStr = data.storedAlgoStr;
                        activeAlgoSteps = storedAlgoStr.split(' ');
                        const container = document.getElementById('algo-display');
                        container.innerHTML = activeAlgoSteps.map(step => `<span class="algo-step">${step}</span>`).join('');
                    }

                    if (data.currentMode) {
                        currentMode = data.currentMode;
                        document.querySelectorAll('.mode-toggle').forEach(el => el.classList.remove('active'));
                        document.getElementById(currentMode === 'auto' ? 'mode-auto' : 'mode-manual').classList.add('active');
                    }

                    historyMoves.forEach(move => executeInstantMove(move));
                    isRestoring = false;
                }
            } catch (err) {
                console.error("Помилка відновлення стану:", err);
                isRestoring = false;
            }
        }
        
        function switchTheme(themeKey, element) {
            document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');
            document.body.style.background = THEMES[themeKey].gradient;
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && cubies.length > 0) {
                buildCube();
            }
        });

        window.onload = init3D;
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
